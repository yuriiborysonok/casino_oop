app = 'casino-game'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile.game"

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  WALLET_HOST = "casino-wallet.fly.dev"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
