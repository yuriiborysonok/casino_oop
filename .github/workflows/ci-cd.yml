name: Casino Platform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Test & Verify Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libpq-dev \
            libpqxx-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libssl-dev

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build Codebase
        run: |
          cd build
          make -j$(nproc)

      - name: Run Unit Tests
        run: |
          cd build
          ./tests/casino_tests

      - name: Verify Docker Wallet Build
        run: |
          docker build -f Dockerfile.wallet -t casino-wallet:latest .

      - name: Verify Docker Game Build
        run: |
          docker build -f Dockerfile.game -t casino-game:latest .
