server {
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Proxy to Game Service
    location /api/spin {
        proxy_pass http://game-service:8082/api/spin;
    }

    # Proxy to Wallet Service
    location /api/ {
        proxy_pass http://wallet-service:8081/api/;
    }
}
