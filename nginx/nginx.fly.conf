server {
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # API Documentation (Swagger)
    location /docs {
        alias /usr/share/nginx/html;
        try_files /docs.html =404;
    }

    location /api/spin {
        proxy_pass https://casino-game.fly.dev/api/spin;
        proxy_set_header Host casino-game.fly.dev;
        proxy_ssl_server_name on;
    }

    location /api/blackjack/ {
        proxy_pass https://casino-game.fly.dev/api/blackjack/;
        proxy_set_header Host casino-game.fly.dev;
        proxy_ssl_server_name on;
    }

    location /health {
        proxy_pass https://casino-wallet.fly.dev/health;
        proxy_set_header Host casino-wallet.fly.dev;
        proxy_ssl_server_name on;
    }

    location /api/transactions {
        proxy_pass https://casino-wallet.fly.dev/api/transactions;
        proxy_set_header Host casino-wallet.fly.dev;
        proxy_ssl_server_name on;
    }

    location /api/insights {
        proxy_pass https://casino-wallet.fly.dev/api/insights;
        proxy_set_header Host casino-wallet.fly.dev;
        proxy_ssl_server_name on;
    }
    location /api/ {
        proxy_pass https://casino-wallet.fly.dev/api/;
        proxy_set_header Host casino-wallet.fly.dev;
        proxy_ssl_server_name on;
    }
}
