version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: casino_user
      POSTGRES_PASSWORD: casino_password
      POSTGRES_DB: casino_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casino_user -d casino_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  wallet-service:
    build: .
    command: ["./wallet_service"]
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://casino_user:casino_password@db:5432/casino_db
      - JWT_SECRET=super-secret-jwt-signing-key-9999
      - INTERNAL_API_KEY=super-secret-internal-key-9999
    depends_on:
      db:
        condition: service_healthy

  game-service:
    build: .
    command: ["./game_service"]
    ports:
      - "8082:8082"
    environment:
      - WALLET_HOST=wallet-service
      - INTERNAL_API_KEY=super-secret-internal-key-9999
    depends_on:
      - wallet-service

  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - wallet-service
      - game-service

volumes:
  pgdata:
